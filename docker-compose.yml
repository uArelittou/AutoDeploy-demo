name: test
services:
  app:
    image: demo:test
    expose:
      - "8044"
    container_name: test-app
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    container_name: test-nginx
    networks:
      - app-network
    depends_on:
      - app
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  app-network: