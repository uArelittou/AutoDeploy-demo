# workflow 的名字，显示在 GitHub Actions 页面
name: test

# 触发条件：每次 push 都跑（不限分支、不限 PR）= 方案 A
on: [push]

# 一个 workflow 由一个或多个 job 组成
# job 之间可以并行或串行，这里两个 job：test 跑测试，build 跑构建推送
jobs:
  # job 的 ID，叫 test
  test:
    # 跑在哪台机器上：GitHub 提供的 Ubuntu 虚拟机
    # 为什么不用你自己的电脑：CI 要的是「干净环境 + 自动」，
    # GitHub 的虚拟机每次都是全新的，能证明你的代码在任何机器上都能跑
    runs-on: ubuntu-latest

    # 一个 job 由多个 step 组成，按顺序执行
    steps:
      # 第1步：拉代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 第2步：装 Python 3.12（和 Dockerfile 一致）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 第3步：装依赖
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 第4步：跑测试
      # 【临时跳过】测回滚期间注释掉，让坏代码能通过 CI 构建镜像
      # 测完回滚后必须放开，恢复 CI 拦截坏代码的能力
      
      - name: Run tests
        run: python -m pytest

      # - name: Skip tests temporarily
      #   run: echo "测试临时跳过，用于验证回滚流程"

  # 第二个 job：构建镜像 + 推到 GHCR
  build:
    runs-on: ubuntu-latest
    # needs: test 意思是「等 test job 跑完且成功后，我才开始」
    # 如果测试失败，镜像就不会构建推送，避免推坏代码上线
    needs: test

    # 这个 job 推镜像到 registry，需要写权限
    # GitHub 默认给 workflow 的 token 只有读权限，必须显式声明写权限
    permissions:
      contents: read
      packages: write  # packages: write = 写 GHCR 镜像的权限

    steps:
      # 第1步：拉代码（每个 job 独立，必须重新拉一次）
      - name: Checkout code
        uses: actions/checkout@v4

      # 第2步：登录 GHCR
      # GITHUB_TOKEN 是 GitHub 自动给每个 workflow 注入的临时令牌，不用你手动配
      # 作用域由上面的 permissions 块控制
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 第3步：构建并推送镜像
      # 为什么要 lowercase：GHCR 镜像名必须全小写，但你的 GitHub 用户名可能有大写字母
      # GITHUB_REPOSITORY=用户名/仓库名（如 uArelittou/AutoDeploy-demo）
      # tr '[:upper:]' '[:lower:]' 把所有大写转小写，得到 uarelittou/auto-deploy-demo
      - name: Build and push image
        run: |
          IMAGE=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          docker build -t $IMAGE:latest .
          docker push $IMAGE:latest
